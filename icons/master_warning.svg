<?xml version="1.0" encoding="UTF-8"?>
<!-- ISO 7000-0434 / Master Warning Triangle — Полная совместимость с Qt Quick / QML -->
<svg 
 id="svg_master_warning"
 width="100" 
 height="85" 
 viewBox="0 0 200 170" 
 version="1.1" 
 xmlns="http://www.w3.org/2000/svg">
  <title>Master Warning Triangle with Exclamation Mark</title>
  
  <!-- Слой 1: Внешний сплошной треугольник со скругленными углами (Красный) -->
  <path fill="#ff0000" d="M 13.5,148 C 4.5,148 0,141 4.5,133 L 86,13 C 90.5,5 99.5,5 104,13 L 185.5,133 C 190,141 185.5,148 176.5,148 Z" />
  
  <!-- Слой 2: Восклицательный знак (Покрашен в черный #000000, чтобы перекрыть треугольник в Qt) -->
  <!-- Верхняя вертикальная черточка знака -->
  <path fill="#000000" d="M 94,48 C 91.5,48 90,50 90,53 L 92,103 C 92,106 94,108 97,108 C 100,108 102,106 102,103 L 104,53 C 104,50 102.5,48 100,48 Z" />
  <!-- Нижняя точка знака -->
  <circle fill="#000000" cx="97" cy="125" r="7.5" />
</svg>
